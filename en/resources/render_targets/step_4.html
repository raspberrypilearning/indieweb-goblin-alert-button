<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Step 4 render</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Trebuchet MS", Verdana, sans-serif;
        color: #1e1234;
        background: linear-gradient(180deg, #fff09c, #ffb0df 55%, #90f8ff 100%);
      }

      main {
        width: min(420px, 100%);
        padding: 28px;
        text-align: center;
        border: 5px solid #1e1234;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow:
          0 0 0 6px #ffffff,
          0 16px 0 #1e1234;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3rem);
        line-height: 0.95;
        text-transform: uppercase;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.5;
      }

      button {
        margin-top: 20px;
        padding: 18px 24px;
        border: 4px solid #1e1234;
        border-radius: 999px;
        background: #ff63b5;
        color: #1e1234;
        font: inherit;
        font-size: 1.1rem;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 8px 0 #1e1234;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>One rude little browser alert</h1>
      <p>Press the button if you would like the browser to announce something completely harmless.</p>
      <button type="button">Press for goblin news</button>
    </main>
  </body>
</html>
